name: terraform apply

on:
    push:
        branches:
        - main
        paths:
          - "terraform/**"

    workflow_dispatch:

env:
    AWS_REGION: eu-west-2
    TF_VAR_container_image: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
    TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
    TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
   
jobs:
    terraform-apply:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: terraform/
        permissions:
            contents: read
            id-token: write

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS credentials via OIDC
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.AWS_ROLE_TERRAFORM_APPLY }}
            aws-region: ${{ env.AWS_REGION }}
            role-session-name: terraform-apply

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: 1.14.3
            
        - name: Terraform Init
          run: terraform init

        - name: Terraform apply
          run: terraform apply -auto-approve

        - name: Post-deploy health check (ECS behind ALB)
          run: curl -f https://aamir-ecs.com/health.json