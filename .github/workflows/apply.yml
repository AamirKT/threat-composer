name: terraform apply

on:
  workflow_run:
    workflows: ["terraform plan"]
    types:
      - completed
  
concurrency:
    group: terraform-apply
    cancel-in-progress: true

env:
    AWS_REGION: eu-west-2
   
jobs:
    terraform-apply:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        permissions:
            contents: read
            id-token: write
            actions: read

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            ref: ${{ github.event.workflow_run.head_sha || github.sha }}

        - name: Download Terraform plan artifact
          if: ${{ github.event_name == 'workflow_run' }}
          uses: actions/download-artifact@v4
          with:
            name: terraform-plan
            run-id: ${{ github.event.workflow_run.id }}
            github-token: ${{ secrets.GITHUB_TOKEN }}

        - name: Show image being deployed
          run: |
            if [ -f image-uri.txt ]; then 
              echo "Deploying image: $(cat image-uri.txt)"   
            fi

        - name: Configure AWS credentials via OIDC
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.AWS_ROLE_TERRAFORM_APPLY }}
            aws-region: ${{ env.AWS_REGION }}
            role-session-name: terraform-apply

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: 1.14.3
            
        - name: Terraform Init
          working-directory: terraform
          run: terraform init

        - name: Terraform apply
          working-directory: terraform
          run: terraform apply -input=false -auto-approve tfplan

        - name: Post-deploy health check
          uses: jtalk/url-health-check-action@v1
          with:
            url: https://${{ vars.DOMAIN_NAME }}/health
            follow-redirect: true
            max-attempts: 10
            retry-delay: 20
        
        - name: Notify success
          if: success()
          run: echo Success! Your infastructure has been applied successfully!
